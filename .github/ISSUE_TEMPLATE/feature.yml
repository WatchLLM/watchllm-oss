---
name: Feature Request
about: Propose a new feature or enhancement
title: "[feat] "
labels: enhancement, triage
assignees: []
body:
  - type: markdown
    attributes:
      value: "## Feature Request"
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [kernel, vscode, schemas, examples, docs]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature and the problem it solves
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered